# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Default Keybinds
# visit https://wiki.hyprland.org/Configuring/Binds/ for more info

# /* ---- ✴️ Variables ✴️ ---- */  #
$scriptsDir = $HOME/.config/hypr/scripts
$UserConfigs = $HOME/.config/hypr/UserConfigs
$UserScripts = $HOME/.config/hypr/UserScripts
source = $UserConfigs/01-UserDefaults.conf


# Базовые активации
$mainMod                = Super                                             # Win
$mainMod_L              = Super_L                                           # Win Left
$altMod                 = $mainMod ALT                                      # Win + Alt
$ctrlMod                = $mainMod CTRL                                     # Win + Ctrl
$shiftMod               = $mainMod SHIFT                                    # Win + Shift
$shiftAltMod            = $shiftMod ALT                                     # Win + Shift + Alt
$shiftCtrlMod           = $shiftMod CTRL                                    # Win + Shift + Ctrl


# Система скриншотов (Проверка)
bind = , Print,  exec, $screenshot screen                                   # Скриншот всего экрана
bind = SHIFT, Print,  exec, $screenshot screen edit                         # Скриншот всего экрана + редактор
bind = ALT, Print, exec, $screenshot window                                 # Скриншот активного окна
bind = SHIFT ALT, Print, exec, $screenshot window edit                      # Скриншот активного окна + редактор
bind = CTRL, Print, exec, $screenshot area                                  # Скриншот выделенной области
bind = SHIFT CTRL, Print, exec, $screenshot area edit                       # Скриншот выделенной области + редактор


# Скрипты
# bind = $mainMod,            V, exec, $clipboard                             # Буфер обмена
bind = $mainMod,            V, exec, $clipboard_caelestia                   # Буфер обмена Caelestia
bind = $mainMod,            C, exec, $emoji_caelestia                       # Выбор emoji
bind = $mainMod,            H, exec, $keys                                  # Список сочетаний клавиш
bind = $mainMod,            W, exec, $wallpapers                            # Выбор обоев
bind = $mainMod,            R, exec, $rofi_theme                            # Выбор темы  Rofi

bind = $mainMod,            O, exec, hyprctl setprop active opaque toggle   # Выбор прозрачности окон
bind = $ctrlMod,            O, exec, $scriptsDir/ChangeBlur.sh              # Выбор размытия Hyprland
bind = $altMod,             O, exec, $scriptsDir/HideBar.sh "caelestia" 1    # Включение/Отключение бар-меню (Hyprpanel, Waybar, Caelestia)

bind = $shiftMod,           G, exec, $games                                 # Отключение всех анимаций
bind = $shiftAltMod,        G, exec, $animations                            # Выбор анимаций Hyprland


# Управление окнами
bind = $mainMod,            F, fullscreen                                   # Полноэкранный режим      
bind = $altMod,             F, fullscreen, 1                                # Нативный полноэкранный режим (Видно Waybar)       
bind = $ctrlMod,            F, togglefloating,                              # Плавающий режим
bind = $ctrlMod,            Delete, exec, hyprctl dispatch exit 0           # Выход из Hyprland
bind = $mainMod,            Q, killactive,                                  # Закрыть окно
bind = $ctrlMod,            Q, exec, $scriptsDir/KillActiveProcess.sh       # Убить окно


# Управление устройством
# bind = $mainMod,            L, exec, $scriptsDir/LockScreen.sh              # Заблокировать экран
bind = $altMod,             L, exec, $scriptsDir/Wlogout.sh                 # Выключение устройства
bindr = $mainMod,           L, global, caelestia:lock
bind = $mainMod, Backspace, exec, $scriptsDir/ShadowMode.sh
# bind = $mainMod, Backspace, global, caelestia:lock


# Работа с рабочими столами
bind = $mainMod,            1, workspace, 1 
bind = $mainMod,            2, workspace, 2
bind = $mainMod,            3, workspace, 3
bind = $mainMod,            4, workspace, 4
bind = $mainMod,            5, workspace, 5
bind = $mainMod,            6, workspace, 6
bind = $mainMod,            7, workspace, 7
bind = $mainMod,            8, workspace, 8
bind = $mainMod,            9, workspace, 9
bind = $mainMod,            0, workspace, 10

bind = $mainMod,            TAB, workspace, m+1
bind = $shiftMod,           TAB, workspace, m-1


# Перемещение окна между рабочими столами
bind = $shiftMod,           1, movetoworkspace, 1 
bind = $shiftMod,           2, movetoworkspace, 2
bind = $shiftMod,           3, movetoworkspace, 3
bind = $shiftMod,           4, movetoworkspace, 4
bind = $shiftMod,           5, movetoworkspace, 5
bind = $shiftMod,           6, movetoworkspace, 6
bind = $shiftMod,           7, movetoworkspace, 7
bind = $shiftMod,           8, movetoworkspace, 8
bind = $shiftMod,           9, movetoworkspace, 9
bind = $shiftMod,           0, movetoworkspace, 10

bind = $shiftMod,           bracketleft, movetoworkspace, -1 # Клавиша [
bind = $shiftMod,           bracketright, movetoworkspace, +1 # Клавиша ]


# Перемещение окна по рабочему столу
bind = $shiftMod,           left, movewindow, l
bind = $shiftMod,           right, movewindow, r
bind = $shiftMod,           up, movewindow, u
bind = $shiftMod,           down, movewindow, d


# Сдвиг окна по рабочему столу
bind = $altMod,             left, swapwindow, l
bind = $altMod,             right, swapwindow, r
bind = $altMod,             up, swapwindow, u
bind = $altMod,             down, swapwindow, d


# Перемещение окна по рабочему столу
bindm = $mainMod,           mouse:272, movewindow # ЛКМ


# Перемещение фокуса
bind = $mainMod,            left, movefocus, l
bind = $mainMod,            right, movefocus, r
bind = $mainMod,            up, movefocus, u
bind = $mainMod,            down, movefocus, d


# Изменение размера окна
binde = $ctrlMod,           left, resizeactive,-50 0
binde = $ctrlMod,           right, resizeactive,50 0
binde = $ctrlMod,           up, resizeactive,0 -50
binde = $ctrlMod,           down, resizeactive,0 50

bindm = $mainMod,           mouse:273, resizewindow # ПКМ


# Медиа клавиши
bindl = , xf86Sleep, exec, systemctl suspend                                # Переход в сон 
bindl = , xf86Rfkill, exec, $scriptsDir/AirplaneMode.sh                     # Авиа режим

bindel = , xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec
bindel = $mainMod, minus, exec, $scriptsDir/Volume.sh --dec

bindel = , xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc
bindel = $mainMod, equal, exec, $scriptsDir/Volume.sh --inc

bindel = $altMod, minus, exec, $scriptsDir/Volume.sh --dec 2
bindel = Ctrl, xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec 2

bindel = $altMod, equal, exec, $scriptsDir/Volume.sh --inc 2
bindel = Ctrl, xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc 2

bindl = , xf86audiomute, exec, $scriptsDir/Volume.sh --toggle
bindel = $shiftMod, Backspace, exec, $scriptsDir/Volume.sh --toggle

bindl = , xf86AudioMicMute, exec, $scriptsDir/Volume.sh --toggle-mic
bindel = $altMod, Backspace, exec, $scriptsDir/Volume.sh --toggle-mic

bindel = $shiftCtrlMod, minus, exec, $scriptsDir/Brightness.sh --dec
bindel = $shiftCtrlMod, equal, exec, $scriptsDir/Brightness.sh --inc

bindel = $shiftAltMod, minus, exec, $scriptsDir/Brightness.sh --dec 2
bindel = $shiftAltMod, equal, exec, $scriptsDir/Brightness.sh --inc 2

bindel = $ctrlMod, Backspace, exec, $scriptsDir/Brightness.sh --cycle

bindl = , xf86AudioPlayPause, exec, $scriptsDir/MediaCtrl.sh --pause        # Поставть на паузу
bindl = , xf86AudioPause, exec, $scriptsDir/MediaCtrl.sh --pause            # Поставить на паузу
bindl = , xf86AudioPlay, exec, $scriptsDir/MediaCtrl.sh --pause             # Поставить на паузу
bindl = $mainMod, K, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioNext, exec, $scriptsDir/MediaCtrl.sh --nxt               # Переключить трэк вперед
bindl = $mainMod, N, exec, $scriptsDir/MediaCtrl.sh --nxt
bindl = , xf86AudioPrev, exec, $scriptsDir/MediaCtrl.sh --prv               # Переключить трэк назад
bindl = $mainMod, P, exec, $scriptsDir/MediaCtrl.sh --prv
bindl = , xf86audiostop, exec, $scriptsDir/.sh --stop              # Остановить воспроизведение

bindln = ALT_L, SHIFT_L, exec, $scriptsDir/SwitchKeyboardLayout.sh          # Смена языка ввода (Us/Ru)
bindln = ALT_L, SPACE, exec, $scriptsDir/SwitchKeyboardLayout.sh


# Special workspace
bind = $altMod, 1, exec, caelestia toggle 1
bind = $altMod, 2, exec, caelestia toggle 2
bind = $altMod, 3, exec, caelestia toggle 3
bind = $altMod, 4, exec, caelestia toggle 4
bind = $altMod, 5, exec, caelestia toggle 5
bind = $altMod, 6, exec, caelestia toggle 6
bind = $altMod, 7, exec, caelestia toggle 7
bind = $altMod, 8, exec, caelestia toggle 8
bind = $altMod, 9, exec, caelestia toggle 9
bind = $altMod, 0, exec, caelestia toggle 0

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, period, workspace, e+1
bind = $mainMod, comma, workspace, e-1

# Master Layout
#bind = $mainMod CTRL, D, layoutmsg, removemaster
#bind = $mainMod CTRL, I, layoutmsg, addmaster
#bind = $mainMod CTRL, J, layoutmsg, cyclenext
#bind = $mainMod CTRL, K, layoutmsg, cycleprev
#bind = $mainMod CTRL, Return, layoutmsg, swapwithmaster

